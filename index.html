<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Kuripe 😻</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  overflow: hidden;
}

h1 {
  margin-top: 60px;
  font-size: 40px;
}

p {
  font-size: 22px;
  margin: 20px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  margin: 10px;
}

/* 💘 Falling hearts */
.heart {
  position: fixed;
  top: -10px;
  color: red;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}

/* 🎁 Popup */
#popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: #ff4d6d;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  z-index: 1000;
}

#overlay {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  top: 0;
  left: 0;
}
</style>

</head>

<body>

<!-- 🎵 Background Music -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<h1>Happy Birthday Kuripe 😻</h1>

<p id="text">Click below... I have something for you 😏</p>

<button onclick="nextStep()">Click Me 👀</button>

<br>
<button onclick="openSurprise()">Open Surprise 🎁</button>

<!-- 🎁 Popup -->
<div id="overlay"></div>

<div id="popup">
  <h2>For You 💖</h2>
  <p>You are my happiness, my peace, my everything 😘</p>
  <p>Happy Birthday Kuripe 😻🎂</p>
  <button onclick="closeSurprise()">Close 💕</button>
</div>

<script>
let step = 0;

function nextStep() {
  step++;

  if (step === 1) {
    document.getElementById("text").innerHTML =
      "First... you are getting older 😂🎂";
  }

  else if (step === 2) {
    document.getElementById("text").innerHTML =
      "But still the cutest person alive 😍💕";
  }

  else if (step === 3) {
    document.getElementById("text").innerHTML =
      "And I'm the luckiest... because you're mine 😌❤️";
  }

  else if (step === 4) {
    document.getElementById("text").innerHTML =
      "Happy Birthday My Love ❤️🎉";
  }

  else {
    document.getElementById("text").innerHTML =
      "Now smile 😘 and enjoy your day 💖";
  }
}

/* 💘 Falling hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

/* 🎁 Surprise */
function openSurprise() {
  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";

  // 💥 extra hearts burst
  for (let i = 0; i < 20; i++) {
    createHeart();
  }
}

function closeSurprise() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
